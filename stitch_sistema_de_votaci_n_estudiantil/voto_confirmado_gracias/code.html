<body class="bg-surface min-h-screen flex items-center justify-center p-margin-mobile">
<!-- 
      Navigation Shell Suppressed:
      As per the Semantic Shell Mandate, transactional/linear screens like this 
      "Success/Confirmation" splash screen MUST NOT render the TopNavBar, SideNavBar, or Footer. 
      The user is at a dead end relative to global nav and needs to focus entirely on the completion message.
    -->
<main class="w-full max-w-md">
<!-- Interactive Level 2 Card -->
<div class="bg-surface-container-lowest shadow-md rounded-xl p-stack-lg md:p-stack-xl flex flex-col items-center text-center">
<!-- Celebratory Icon Container -->
<div class="bg-primary-container w-24 h-24 rounded-full flex items-center justify-center mb-stack-lg shadow-sm">

<i class="w-12 h-12 text-on-primary-container" data-lucide="check" stroke-width="2.5"></i>
</div>
<!-- Success Message -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-stack-sm">
                ¡Gracias por votar!
            </h1>

            </p>
